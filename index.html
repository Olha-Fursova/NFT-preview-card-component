<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFT preview card component</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <main class="main">
      <picture class="image"></picture>
      <section class="info-section">
        <h1 class="main-heading">Equilibrium #3429</h1>
        <p class="descreption">
          Our Equilibrium collection promotes balance and calm.
        </p>

        <div class="extra-info-container">
          <span class="flex-box">
            <svg class="price-icon"><use href="./images/romb.svg" /></svg>
            <p class="price-text">0.041 ETH</p>
          </span>
          <span class="flex-box">
            <svg class="clock-icon"><use href="./images/clock.svg" /></svg>
            <p class="time-text">3 days left</p>
          </span>
        </div>

        <div class="creator-container">
          <img
            class="creator-image"
            src="./images/face.png"
            alt="Profile image of the creator"
          />
          <p class="creator-name">
            Creation of <span class="highlight-name">Jules Wyvern</span>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
